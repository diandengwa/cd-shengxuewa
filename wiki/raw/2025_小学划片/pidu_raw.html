<div class="lead"><div class="leading"><p><font color="#000000">【导语】：</font>2025年郫都区小学一年级新生入学划片范围已经公布，请各位家长注意查看最新消息哦。</p></div></div><div class="huodong-box-top" id="infoidData" data-id="198865"></div><!--content--><p>　　<strong><span style="color:#E53333;">2025年成都市郫都区小学入学<a href="http://cd.bendibao.com/news/xuequhuafen/" target="_blank" style="color:#0000FF">划片</a>范围</span></strong></p><p>　　尊敬的家长朋友：</p><p>　　根据郫都区公办小学分布和学位供给情况，结合户籍儿童入学需求，按照相对就近原则确定2025年郫都区小学一年级新生入学划片范围。现公告如下：</p><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132633_39192.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132638_62584.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132642_61630.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132646_53776.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132651_49662.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132655_84838.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132700_92490.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132704_56519.png"></center><center><img width="600" src="https://imgbdb4.bendibao.com/cdbdb/edu/20256/17/2025617132710_86481.png"></center> <div id="huodong-venue"></div><div id="adInArticle" class="adInArticletishi"><div><p>温馨提示：微信搜索公众号<a href="https://imgbdb4.bendibao.com/dazheimg/202412/17/20241217092449_51669.png" target="_blank">【成都本地宝升学】</a>，关注后回复【小学划片】，一键查询2025成都市小学划片范围汇总，还可单独查看各区小学划片、升学安排，进入成都市小学划片专题等。</p><p style="text-align:center;"><img data-echo="https://imgbdb4.bendibao.com/dazheimg/20256/17/2025617141906_96041.png" style="display: inline;"></p></div></div><div class="ad-in-article a-2"><!--

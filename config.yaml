# OPC 内容工厂配置文件
# 环境变量覆盖: OPC_ROOT, DEEPSEEK_API_KEY, GITHUB_TOKEN, MPTEXT_API_KEY, WECHAT_APP_ID, WECHAT_APP_SECRET
# 微信支付V3配置: WECHAT_PAY_MERCHANT_ID, WECHAT_PAY_API_V3_KEY, WECHAT_PAY_CERT_PATH, WECHAT_PAY_CERT_SERIAL_NO, WECHAT_PAY_NOTIFY_URL, WECHAT_PAY_REFUND_NOTIFY_URL

# 路径配置 (支持环境变量)
paths:
  root: "${OPC_ROOT}"
  knowledge_base: "${OPC_ROOT}/knowledge-base"
  drafts: "${OPC_ROOT}/drafts"
  reviewed: "${OPC_ROOT}/reviewed"
  ready_to_publish: "${OPC_ROOT}/ready-to-publish"
  raw_articles: "${OPC_ROOT}/raw-articles"
  logs: "${OPC_ROOT}/logs"
  scripts: "${OPC_ROOT}/scripts"
  
  # 政策查询模块数据路径
  policy_data: "${OPC_ROOT}/data/policy"
  # 划片数据路径
  school_district_data: "${OPC_ROOT}/data/school-district"
  # 升学日历数据路径
  calendar_data: "${OPC_ROOT}/data/calendar"

# API配置
api:
  deepseek:
    key: "${DEEPSEEK_API_KEY}"
    url: "https://api.deepseek.com/v1/chat/completions"
    model: "deepseek-chat"
    max_retries: 3
    timeout: 90
    temperature: 0.7
    max_tokens: 4000

  mptext:
    key: "${MPTEXT_API_KEY}"
    url: "https://api.mptext.com/v1"

# Git配置
git:
  repo: "diandengwa/opc-agent-knowledge"
  branch: "main"
  token: "${GITHUB_TOKEN}"
  auto_push: true
  commit_message: "auto: daily content update {date}"

# 微信推送配置 (可选)
wechat:
  enabled: false
  cdp_url: "http://localhost:9222"
  # 服务器端禁用微信推送，保留在Windows本地执行

# 微信草稿箱配置（新增）
wechat_draft:
  # 是否启用自动上传到微信公众号草稿箱
  enabled: true
  # 上传成功后通知地址（可选，用于回调通知）
  notify_url: "${WECHAT_DRAFT_NOTIFY_URL}"
  # 微信公众号AppID
  app_id: "${WECHAT_APP_ID}"
  # 微信公众号AppSecret
  app_secret: "${WECHAT_APP_SECRET}"
  # 排版模板路径（支持绝对路径或相对路径，相对路径基于项目根目录）
  template_path: "${OPC_ROOT}/templates/wechat_draft.html"
  # 默认封面图路径（用于没有设置封面的文章）
  default_cover: "${OPC_ROOT}/assets/default_cover.png"
  # 默认封面媒体ID（微信公众号素材管理中的thumb_media_id，用于草稿箱上传）
  default_thumb_media_id: ""
  # 作者名称（公众号后台显示）
  author: "点灯蛙"
  # 是否开启原创声明
  declare_original: true
  # 原创声明时是否开启赞赏
  enable_appreciation: false
  # 是否开启留言
  enable_comment: true
  # 草稿箱API端点（微信公众号官方API）
  api_base_url: "https://api.weixin.qq.com/cgi-bin/draft"
  # 获取access_token的API端点
  token_api_url: "https://api.weixin.qq.com/cgi-bin/token"
  # 上传超时时间（秒）
  upload_timeout: 60
  # 重试次数
  max_retries: 3
  # 重试间隔（秒）
  retry_delay: 5
  # 排版配置
  formatting:
    # 正文默认字体大小（px）
    font_size: 16
    # 行高倍数
    line_height: 1.8
    # 段落间距（px）
    paragraph_spacing: 12
    # 标题样式
    title_style:
      font_size: 20
      font_weight: "bold"
      color: "#333333"
      alignment: "center"
    # 引用样式
    quote_style:
      border_color: "#4A90D9"
      background_color: "#F0F7FF"
      font_size: 14
      font_color: "#666666"
    # 代码块样式
    code_style:
      background_color: "#F5F5F5"
      font_family: "Consolas, Monaco, monospace"
      font_size: 14
  # ===== 新增排版相关配置 =====
  # 排版样式配置文件路径（支持绝对路径或相对路径）
  style_config: "config/wechat_style.yaml"
  # 默认标题前缀（自动添加到文章标题前，例如："【成都升学】"）
  default_title_prefix: ""
  # 是否自动发布到微信公众号（true=上传草稿箱后自动发布，false=仅保存草稿）
  auto_publish: false

# 微信支付V3配置（新增）
wechat_pay:
  # 商户号（微信支付商户平台获取）
  merchant_id: "${WECHAT_PAY_MERCHANT_ID}"
  # APIv3密钥（微信支付商户平台设置）
  api_v3_key: "${WECHAT_PAY_API_V3_KEY}"
  # 商户证书路径（p12或pem格式，支持绝对路径或相对路径）
  cert_path: "${WECHAT_PAY_CERT_PATH}"
  # 商户证书序列号（证书中获取）
  cert_serial_no: "${WECHAT_PAY_CERT_SERIAL_NO}"
  # 支付回调URL（公网可访问）
  notify_url: "${WECHAT_PAY_NOTIFY_URL}"
  # 退款结果通知地址（用于异步通知）
  refund_notify_url: "${WECHAT_PAY_REFUND_NOTIFY_URL}"
  # API基础地址（默认生产环境）
  api_base_url: "https://api.mch.weixin.qq.com"
  # 连接超时时间（秒）
  timeout: 30
  # 重试次数
  max_retries: 3
  # 重试间隔（秒）
  retry_delay: 2

# 日志配置
logging:
  level: "INFO"
  format: "json"
  file: "${OPC_ROOT}/logs/opc.log"
  max_size: "100MB"
  backup_count: 7

# 流水线配置
pipeline:
  # 生成配置
  generation:
    min_score: 8.0
    max_attempts: 2
    default_count: 2
    channels: ["公众号", "小红书", "朋友圈", "微信群"]
    
    # 选题约束
    constraints:
      xiaoshengchu_ratio: 0.7  # 70%小升初
      min_word_count: 800
      max_word_count: 1500
      
    # 标题约束
    title:
      # 标题长度范围
      min_length: 10
      max_length: 64
      # 标题风格
      style: ["热点型", "干货型", "政策解读型", "数据型"]
      # 禁止使用的词汇
      forbidden_words: ["最", "第一", "绝对", "100%", "保证", "包过"]
      # 推荐使用的关键词
      recommended_keywords: ["成都", "升学", "小升初", "中考", "政策", "划片", "摇号"]
      
    # 内容约束
    content:
      # 必须包含的模块
      required_modules: ["政策依据", "数据支撑", "操作建议", "风险提示"]
      # 引用来源要求
      citation_required: true
      # 免责声明
      disclaimer: "本文仅供参考，具体政策以教育部门官方发布为准。"
      
  # 审核配置
  review:
    # 审核标准
    standards:
      - "政策准确性"
      - "数据真实性"
      - "表述客观性"
      - "合规性检查"
    # 审核人
    reviewers: ["admin", "editor"]
    # 自动审核规则
    auto_review:
      enabled: true
      min_score: 7.0
      check_policy: true
      check_data: true
      
  # 发布配置
  publish:
    # 发布渠道
    channels: ["公众号", "小红书"]
    # 发布时间
    schedule:
      enabled: true
      time: "08:00"
      timezone: "Asia/Shanghai"
    # 发布前检查
    pre_publish_check:
      - "封面图检查"
      - "标题检查"
      - "内容完整性检查"
      - "合规性检查"

# 用户配额配置（新增）
quota:
  # 免费用户每日诊断次数
  free_daily: 3
  # 付费用户每次诊断价格（分）
  pay_per_diagnosis: 100
  # 套餐配置
  packages:
    - name: "单次诊断"
      price: 100  # 分
      diagnoses: 1
      valid_days: 30
    - name: "5次诊断包"
      price: 400  # 分，8折
      diagnoses: 5
      valid_days: 90
    - name: "10次诊断包"
      price: 700  # 分，7折
      diagnoses: 10
      valid_days: 180
    - name: "月度无限诊断"
      price: 2000  # 分
      diagnoses: -1  # -1表示无限次
      valid_days: 30
      
  # 诊断类型
  diagnosis_types:
    - name: "升学路径诊断"
      code: "path"
      price: 100  # 分
      description: "基于学生成绩、特长、家庭情况，推荐最优升学路径"
    - name: "学校匹配诊断"
      code: "school_match"
      price: 100  # 分
      description: "根据学生画像，匹配最适合的学校"
    - name: "政策解读诊断"
      code: "policy"
      price: 50  # 分
      description: "针对具体升学政策进行个性化解读"
    - name: "综合诊断报告"
      code: "comprehensive"
      price: 200  # 分
      description: "全面的升学诊断报告，包含路径、学校、政策分析"

# 数据库配置
database:
  # SQLite数据库路径
  url: "sqlite:///${OPC_ROOT}/data/k12_rocket.db"
  # 连接池配置
  pool_size: 5
  max_overflow: 10
  # 超时配置
  pool_timeout: 30
  pool_recycle: 3600

# 缓存配置
cache:
  # 使用内存缓存
  type: "memory"
  # 默认过期时间（秒）
  default_ttl: 300
  # 最大缓存条目数
  max_items: 1000

# 安全配置
security:
  # JWT密钥
  jwt_secret: "${JWT_SECRET}"
  # JWT过期时间（小时）
  jwt_expire_hours: 24
  # 密码哈希算法
  password_hash: "bcrypt"
  # CORS配置
  cors:
    allowed_origins:
      - "http://localhost:8000"
      - "https://k12.diandengwa.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
      - "X-Request-ID"
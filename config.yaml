# OPC 内容工厂配置文件
# 环境变量覆盖: OPC_ROOT, DEEPSEEK_API_KEY, GITHUB_TOKEN, MPTEXT_API_KEY, WECHAT_APP_ID, WECHAT_APP_SECRET
# 微信支付V3配置: WECHAT_PAY_MERCHANT_ID, WECHAT_PAY_API_V3_KEY, WECHAT_PAY_CERT_PATH, WECHAT_PAY_CERT_SERIAL_NO, WECHAT_PAY_NOTIFY_URL, WECHAT_PAY_REFUND_NOTIFY_URL

# 路径配置 (支持环境变量)
paths:
  root: "${OPC_ROOT}"
  knowledge_base: "${OPC_ROOT}/knowledge-base"
  drafts: "${OPC_ROOT}/drafts"
  reviewed: "${OPC_ROOT}/reviewed"
  ready_to_publish: "${OPC_ROOT}/ready-to-publish"
  raw_articles: "${OPC_ROOT}/raw-articles"
  logs: "${OPC_ROOT}/logs"
  scripts: "${OPC_ROOT}/scripts"
  
  # 政策查询模块数据路径
  policy_data: "${OPC_ROOT}/data/policy"
  # 划片数据路径
  school_district_data: "${OPC_ROOT}/data/school-district"
  # 升学日历数据路径
  calendar_data: "${OPC_ROOT}/data/calendar"

# API配置
api:
  deepseek:
    key: "${DEEPSEEK_API_KEY}"
    url: "https://api.deepseek.com/v1/chat/completions"
    model: "deepseek-chat"
    max_retries: 3
    timeout: 90
    temperature: 0.7
    max_tokens: 4000

  mptext:
    key: "${MPTEXT_API_KEY}"
    url: "https://api.mptext.com/v1"

# Git配置
git:
  repo: "diandengwa/opc-agent-knowledge"
  branch: "main"
  token: "${GITHUB_TOKEN}"
  auto_push: true
  commit_message: "auto: daily content update {date}"

# 微信推送配置 (可选)
wechat:
  enabled: false
  cdp_url: "http://localhost:9222"
  # 服务器端禁用微信推送，保留在Windows本地执行

# 微信草稿箱配置（新增）
wechat_draft:
  # 是否启用自动上传到微信公众号草稿箱
  enabled: true
  # 上传成功后通知地址（可选，用于回调通知）
  notify_url: "${WECHAT_DRAFT_NOTIFY_URL}"
  # 微信公众号AppID
  app_id: "${WECHAT_APP_ID}"
  # 微信公众号AppSecret
  app_secret: "${WECHAT_APP_SECRET}"
  # 排版模板路径（支持绝对路径或相对路径，相对路径基于项目根目录）
  template_path: "${OPC_ROOT}/templates/wechat_draft.html"
  # 默认封面图路径（用于没有设置封面的文章）
  default_cover: "${OPC_ROOT}/assets/default_cover.png"
  # 作者名称（公众号后台显示）
  author: "点灯蛙"
  # 是否开启原创声明
  declare_original: true
  # 原创声明时是否开启赞赏
  enable_appreciation: false
  # 是否开启留言
  enable_comment: true
  # 草稿箱API端点（微信公众号官方API）
  api_base_url: "https://api.weixin.qq.com/cgi-bin/draft"
  # 获取access_token的API端点
  token_api_url: "https://api.weixin.qq.com/cgi-bin/token"
  # 上传超时时间（秒）
  upload_timeout: 30
  # 重试次数
  max_retries: 3
  # 重试间隔（秒）
  retry_delay: 5
  # 排版配置
  formatting:
    # 正文默认字体大小（px）
    font_size: 16
    # 行高倍数
    line_height: 1.8
    # 段落间距（px）
    paragraph_spacing: 12
    # 标题样式
    title_style:
      font_size: 20
      font_weight: "bold"
      color: "#333333"
      alignment: "center"
    # 引用样式
    quote_style:
      border_color: "#4A90D9"
      background_color: "#F0F7FF"
      font_size: 14
      font_color: "#666666"
    # 代码块样式
    code_style:
      background_color: "#F5F5F5"
      font_family: "Consolas, Monaco, monospace"
      font_size: 14
  # ===== 新增排版相关配置 =====
  # 排版样式配置文件路径（支持绝对路径或相对路径）
  style_config: "config/wechat_style.yaml"
  # 默认标题前缀（自动添加到文章标题前，例如："【成都升学】"）
  default_title_prefix: ""
  # 是否自动发布到微信公众号（true=上传草稿箱后自动发布，false=仅保存草稿）
  auto_publish: false

# 微信支付V3配置（新增）
wechat_pay:
  # 商户号（微信支付商户平台获取）
  merchant_id: "${WECHAT_PAY_MERCHANT_ID}"
  # APIv3密钥（微信支付商户平台设置）
  api_v3_key: "${WECHAT_PAY_API_V3_KEY}"
  # 商户证书路径（p12或pem格式，支持绝对路径或相对路径）
  cert_path: "${WECHAT_PAY_CERT_PATH}"
  # 商户证书序列号（证书中获取）
  cert_serial_no: "${WECHAT_PAY_CERT_SERIAL_NO}"
  # 支付回调URL（公网可访问）
  notify_url: "${WECHAT_PAY_NOTIFY_URL}"
  # 退款结果通知地址（用于异步通知）
  refund_notify_url: "${WECHAT_PAY_REFUND_NOTIFY_URL}"
  # API基础地址（默认生产环境）
  api_base_url: "https://api.mch.weixin.qq.com"
  # 连接超时时间（秒）
  timeout: 30
  # 重试次数
  max_retries: 3
  # 重试间隔（秒）
  retry_delay: 2

# 日志配置
logging:
  level: "INFO"
  format: "json"
  file: "${OPC_ROOT}/logs/opc.log"
  max_size: "100MB"
  backup_count: 7

# 流水线配置
pipeline:
  # 生成配置
  generation:
    min_score: 8.0
    max_attempts: 2
    default_count: 2
    channels: ["公众号", "小红书", "朋友圈", "微信群"]
    
    # 选题约束
    constraints:
      xiaoshengchu_ratio: 0.7  # 70%小升初
      min_word_count: 800
      max_word_count: 1500
      
    # 标题约束
    title:
      min_length: 12
      max_length: 18
      required_elements: ["数字", "成都", "升学", "政策"]

# 按次诊断计费配置（新增）
diagnosis_pricing:
  # 单次诊断价格（元）
  price_per_diagnosis: 9.9
  # 免费诊断次数（新用户）
  free_diagnoses: 1
  # 套餐配置
  packages:
    - name: "单次诊断"
      diagnoses: 1
      price: 9.9
      discount: 0
    - name: "3次套餐"
      diagnoses: 3
      price: 24.9
      discount: 0.16  # 约8.3元/次
    - name: "10次套餐"
      diagnoses: 10
      price: 69.9
      discount: 0.29  # 约6.99元/次
    - name: "30次套餐"
      diagnoses: 30
      price: 159.9
      discount: 0.46  # 约5.33元/次
  # 诊断类型配置
  diagnosis_types:
    - name: "升学路径诊断"
      code: "path_diagnosis"
      price: 9.9
      description: "基于学生成绩、户籍、学籍等信息的升学路径推荐"
    - name: "学校匹配诊断"
      code: "school_match"
      price: 9.9
      description: "根据学生画像匹配最适合的学校"
    - name: "政策解读诊断"
      code: "policy_analysis"
      price: 9.9
      description: "针对特定升学政策的个性化解读"
    - name: "综合诊断报告"
      code: "comprehensive"
      price: 19.9
      description: "包含升学路径、学校匹配、政策解读的完整诊断报告"
  # 支付相关配置
  payment:
    # 支付超时时间（分钟）
    timeout_minutes: 30
    # 订单过期时间（分钟）
    order_expire_minutes: 60
    # 是否启用支付
    enabled: true
    # 支付方式
    methods:
      - wechat_pay
    # 测试模式（使用沙箱环境）
    test_mode: false
    # 沙箱环境配置
    sandbox:
      api_base_url: "https://api.mch.weixin.qq.com/sandboxnew"
      merchant_id: "1900000109"
      api_v3_key: "sandbox_api_v3_key"
      cert_path: ""
      cert_serial_no: ""
      notify_url: "http://localhost:8000/api/v1/payment/notify"
      refund_notify_url: "http://localhost:8000/api/v1/payment/refund-notify"
name: Deploy OPC Content Factory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  IMAGE_NAME: opc-content-factory

jobs:
  # Build and test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run config loader test
      run: |
        python -c "import sys; sys.path.insert(0, 'scripts'); from config_loader import ConfigLoader; print('鉁?ConfigLoader import success')"
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Build Docker image (test)
      run: |
        docker build . -t ${{ env.IMAGE_NAME }}:test
      continue-on-error: true

  # Deploy to server
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Tencent Cloud Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 20m
        script: |
          # Navigate to project directory
          cd /root/cd-shengxuewa
          
          # Pull latest code
          echo "馃摜 Pulling latest code..."
          git fetch origin && git reset --hard origin/main
          
          # Stop and remove old container
          echo "馃洃 Stopping old container..."
          docker stop ${{ env.IMAGE_NAME }} || true
          docker rm ${{ env.IMAGE_NAME }} || true
          
          # Remove old image
          echo "馃棏锔? Removing old image..."
          docker rmi ${{ env.IMAGE_NAME }}:latest || true
          
          # Build new image
          echo "🏗️ Building new image..."
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          
          # Start new container
          echo "🚀 Starting new container..."
          docker run -d \
            --name ${{ env.IMAGE_NAME }} \
            --restart unless-stopped \
            --env-file /root/cd-shengxuewa/.env \
            -e KNOWLEDGE_BASE_DIR="/app/opc-agent-knowledge" \
            -e DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            -e LOG_LEVEL="INFO" \
            -v /root/opc-agent-knowledge:/app/opc-agent-knowledge:ro \
            -v /root/cd-shengxuewa/logs:/app/logs \
            -v /root/cd-shengxuewa/drafts:/app/drafts \
            -v /root/cd-shengxuewa/reviewed:/app/reviewed \
            -v /root/cd-shengxuewa/ready-to-publish:/app/ready-to-publish \
            --health-cmd "curl -f http://localhost:8000/health || exit 1" \
            --health-interval 5m \
            --health-timeout 30s \
            --health-retries 3 \
            ${{ env.IMAGE_NAME }}:latest
          
          # Wait for container to start
          sleep 10
          
          # Verify container is running
          echo "鉁?Verifying container status..."
          docker ps --filter name=${{ env.IMAGE_NAME }} --format "{{.Status}}"
          
          # Clean up old images
          echo "馃Ч Cleaning up..."
          docker image prune -f
          
          echo "鉁?Deployment completed successfully!"
    
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 2m
        script: |
          # Check container health
          echo "Running health check..."
          docker exec ${{ env.IMAGE_NAME }} curl -f http://localhost:8000/health
          
          # Check container logs
          echo "馃搵 Recent logs:"
          docker logs ${{ env.IMAGE_NAME }} --tail 20
          
          echo "鉁?Verification completed!"
    
    - name: Notify success on Discord/Slack
      if: success()
      run: |
        echo "鉁?OPC Content Factory deployed successfully to production"
        echo "Container: ${{ env.IMAGE_NAME }}"
        echo "Time: $(date)"
      continue-on-error: true
    
    - name: Notify failure
      if: failure()
      run: |
        echo "鉂?OPC Content Factory deployment failed"
        echo "Check the logs for details"
        exit 1
      continue-on-error: true


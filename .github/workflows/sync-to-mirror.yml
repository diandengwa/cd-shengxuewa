name: Sync to Knowledge Mirror

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'MEMORY.md'
      - 'pipeline-state/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync to opc-agent-knowledge
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          # Push directly with token in URL (works around checkout credential cleanup)
          git push "https://x-access-token:${MIRROR_TOKEN}@github.com/tangshaowan/opc-agent-knowledge.git" main --force

name: Sync to Knowledge Mirror

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'MEMORY.md'
      - 'pipeline-state/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync to opc-agent-knowledge
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          # Debug: verify token works via API first
          curl -s -H "Authorization: token ${MIRROR_TOKEN}" \
            https://api.github.com/repos/tangshaowan/opc-agent-knowledge \
            | head -5
          
          # Add mirror remote with token embedded
          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/tangshaowan/opc-agent-knowledge.git" 2>/dev/null || true
          
          # Debug: show remote URLs
          git remote -v
          
          # Force push
          git push mirror main --force

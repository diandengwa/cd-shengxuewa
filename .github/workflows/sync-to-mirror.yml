name: Sync to Knowledge Mirror

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'MEMORY.md'
      - 'pipeline-state/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync to opc-agent-knowledge
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          # Configure git to use the token for the mirror repo
          git config --global credential.helper store
          echo "https://x-access-token:${MIRROR_TOKEN}@github.com" > ~/.git-credentials
          git remote add mirror https://github.com/tangshaowan/opc-agent-knowledge.git 2>/dev/null || true
          git push mirror main --force

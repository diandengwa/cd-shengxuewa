name: Sync to Knowledge Mirror

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'MEMORY.md'
      - 'pipeline-state/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync to opc-agent-knowledge via SSH Deploy Key
        env:
          MIRROR_DEPLOY_KEY: ${{ secrets.MIRROR_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$MIRROR_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote add mirror git@github.com:tangshaowan/opc-agent-knowledge.git 2>/dev/null || true
          git push mirror main --force

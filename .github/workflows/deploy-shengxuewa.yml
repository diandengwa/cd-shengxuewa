name: Deploy cd-shengxuewa to Tencent Cloud

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'static/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

env:
  SERVER_HOST: 162.14.74.251
  SERVER_USER: root
  REMOTE_PATH: /root/cd-shengxuewa

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Sync to Tencent Cloud
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "app/,static/,requirements.txt,main.py"
        target: /root/cd-shengxuewa
        strip_components: 0

    - name: Restart service
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /root/cd-shengxuewa
          git pull --rebase origin main
          pip install -r requirements.txt -q
          systemctl restart shengxuewa.service
          sleep 3
          systemctl is-active shengxuewa.service && echo "Service restarted OK" || echo "SERVICE FAILED"

version: '3.8'

services:
  # OPC Content Factory Main Service
  opc-content-factory:
    build: .
    container_name: opc-content-factory
    restart: unless-stopped
    
    # Environment variables
    environment:
      - OPC_ROOT=/app
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MPTEXT_API_KEY=${MPTEXT_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LOG_LEVEL=INFO
    
    # Volume mounts
    volumes:
      - ./knowledge-base:/app/knowledge-base
      - ./drafts:/app/drafts
      - ./reviewed:/app/reviewed
      - ./ready-to-publish:/app/ready-to-publish
      - ./raw-articles:/app/raw-articles
      - ./logs:/app/logs
      - ./pipeline-logs:/app/pipeline-logs
    
    # Network
    networks:
      - opc-network
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    restart: unless-stopped
    networks:
      - opc-network
    volumes:
      - redis-data:/data

  # Optional: PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: opc-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=opc
      - POSTGRES_USER=opc
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opc_password}
    networks:
      - opc-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  opc-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

# ============================================================
# config/wechat_style.yaml
# 微信公众号排版样式配置文件
# 定义字体大小、行高、间距、颜色、引用块样式、代码块样式等参数
# 方便调整排版风格，支持多套主题切换
# ============================================================

# 当前使用的主题名称
active_theme: default

# 主题定义
themes:
  # 默认主题 - 清新阅读风格
  default:
    display_name: "默认清新"
    description: "适合日常文章推送，白底黑字，简洁大方"
    
    # 基础字体设置
    font:
      family: "'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif"
      size: 16px          # 正文字体大小
      line_height: 1.75   # 行高倍数
      color: "#333333"    # 正文颜色
      letter_spacing: 0.5px  # 字间距
    
    # 标题样式
    heading:
      h1:
        size: 22px
        color: "#1a1a1a"
        weight: bold
        margin_top: 24px
        margin_bottom: 12px
      h2:
        size: 20px
        color: "#2c3e50"
        weight: bold
        margin_top: 20px
        margin_bottom: 10px
      h3:
        size: 18px
        color: "#34495e"
        weight: 600
        margin_top: 16px
        margin_bottom: 8px
    
    # 段落间距
    paragraph:
      margin_bottom: 16px
      text_indent: 2em    # 首行缩进
    
    # 引用块样式
    blockquote:
      background: "#f0f4f8"
      border_left: "4px solid #3498db"
      padding: "12px 16px"
      margin: "16px 0"
      color: "#555555"
      font_size: 15px
      border_radius: 4px
    
    # 代码块样式
    code_block:
      background: "#282c34"
      color: "#abb2bf"
      font_family: "'Fira Code', 'Consolas', 'Monaco', monospace"
      font_size: 14px
      line_height: 1.6
      padding: "16px 20px"
      border_radius: 6px
      margin: "16px 0"
      overflow_x: auto
    
    # 内联代码样式
    inline_code:
      background: "#f5f5f5"
      color: "#e74c3c"
      padding: "2px 6px"
      border_radius: 3px
      font_size: 14px
      font_family: "'Consolas', 'Monaco', monospace"
    
    # 列表样式
    list:
      margin_bottom: 12px
      padding_left: 24px
      item_margin_bottom: 6px
      bullet_color: "#3498db"  # 无序列表圆点颜色
    
    # 链接样式
    link:
      color: "#2980b9"
      text_decoration: none
      hover_color: "#1a5276"
    
    # 图片样式
    image:
      max_width: "100%"
      border_radius: 8px
      margin: "16px 0"
      caption:
        font_size: 13px
        color: "#999999"
        text_align: center
        margin_top: 8px
    
    # 表格样式
    table:
      border_collapse: collapse
      width: "100%"
      margin: "16px 0"
      header:
        background: "#f8f9fa"
        color: "#333333"
        weight: bold
        padding: "10px 12px"
      cell:
        padding: "8px 12px"
        border: "1px solid #dee2e6"
      stripe:
        even_row_background: "#f8f9fa"
        odd_row_background: "#ffffff"
    
    # 分割线样式
    hr:
      border: "none"
      border_top: "1px solid #e0e0e0"
      margin: "24px 0"
    
    # 强调样式
    strong:
      color: "#2c3e50"
      weight: bold
    
    # 标记/高亮样式
    mark:
      background: "#fff3cd"
      color: "#856404"
      padding: "2px 4px"
      border_radius: 2px
    
    # 脚注样式
    footnote:
      font_size: 13px
      color: "#999999"
      margin_top: 24px
      border_top: "1px solid #e0e0e0"
      padding_top: 12px

  # 暗色主题 - 护眼模式
  dark:

# 微信公众号特殊适配参数
wechat_platform:
  # 微信图文消息最大宽度（像素）
  max_content_width: 677
  
  # 微信支持的字体大小范围（px）
  font_size_range:
    min: 14
    max: 18
    default: 16
  
  # 微信支持的字体颜色（十六进制）
  color_palette:
    - "#333333"  # 正文
    - "#666666"  # 次要文字
    - "#999999"  # 辅助文字
    - "#1a1a1a"  # 标题
    - "#3498db"  # 链接/强调色
    - "#e74c3c"  # 警告/错误
    - "#27ae60"  # 成功/正确
    - "#f39c12"  # 提醒/注意
  
  # 微信图文消息中的图片限制
  image_limits:
    max_size_mb: 10
    supported_formats: ["jpg", "jpeg", "png", "gif"]
    max_count_per_article: 50
  
  # 微信图文消息中的代码块适配
  code_block_wechat:
    # 微信不支持自定义代码块样式，使用预格式化文本
    use_pre_tag: true
    # 是否添加行号
    show_line_numbers: false
    # 是否启用代码高亮（微信不支持，但保留标记）
    enable_highlight: false

# 排版引擎配置
engine_config:
  # 是否启用自动首行缩进
  auto_indent: true
  
  # 是否启用自动段落间距
  auto_paragraph_spacing: true
  
  # 是否启用智能引号替换
  smart_quotes: true
  
  # 是否启用中文标点修正
  chinese_punctuation_fix: true
  
  # 是否启用自动生成目录
  auto_toc: false
  
  # 是否启用脚注自动编号
  auto_footnote_numbering: true
  
  # 输出格式选项
  output:
    # 是否压缩HTML（移除多余空白）
    minify_html: false
    # 是否添加微信兼容性注释
    add_wechat_comments: true
    # 编码方式
    encoding: "utf-8"